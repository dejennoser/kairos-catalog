spring:
  application:
    name: kairos

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB


  datasource:
    url: jdbc:postgresql://localhost:5432/kairos
    username: kairos
    password: kairos
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  threads:
    virtual:
      enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/kairos

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html

minio:
  url: http://localhost:9000
  access-key: kairos
  secret-key: kairos123
  bucket: kairos-products
opensearch:
  host: localhost
  port: 9200
  index: products